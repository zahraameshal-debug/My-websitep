<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق احجزني - الإدارة</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f2f2f7;
}


.page{
  display:none;
  max-width:450px;
  margin:20px auto;
  background:#fff;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.active{
  display:block;
}


.title-box{
  background:#2c3e50;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}


.content{
  padding:15px;
  text-align:center;
}


.btn-service{
  background:#eef2f7;
  border:none;
  padding:15px;
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
  font-size:18px;
  cursor:pointer;
}


.btn-book{
  background:#2c3e50;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:12px;
  margin-top:15px;
  font-size:18px;
  cursor:pointer;
}


.back-btn{
  background:none;
  border:1px solid #2c3e50;
  color:#2c3e50;
  padding:6px 15px;
  border-radius:10px;
  margin:10px;
  cursor:pointer;
}


.info-card{
  background:#f5f5f5;
  padding:15px;
  border-radius:15px;
  text-align:right;
  margin-top:15px;
}

.info-row{
  margin-bottom:10px;
  font-weight:bold;
  color:#2c3e50;
}
</style>
</head>

<body>


<div id="adminPage" class="page active">

  <button class="back-btn" onclick="location.href='1.html'">⬅ رجوع</button>

  <div class="title-box">الإدارة</div>

  <div class="content">

    <button class="btn-service">غرفة المدير</button>
    <button class="btn-service">السكرتير</button>

    <button class="btn-service" style="background:#2c3e50;color:white;" onclick="showClinic()">
      العيادة
    </button>

  </div>
</div>


<div id="clinicPage" class="page">

  <button class="back-btn" onclick="showAdmin()">⬅ رجوع</button>

  <div class="title-box">العيادة</div>

  <div class="content">

    <div class="info-card">
      <div class="info-row">الحالة: مشغول</div>
      <div class="info-row">الانتظار: 5 - 20 دقيقة</div>
      <div class="info-row">رقم الحجز: 14</div>
    </div>

    <button class="btn-book" onclick="goSurvey()">احجزني</button>

  </div>
</div>


<div id="surveyPage" class="page">

  <div class="title-box">الاستبانة</div>

  <div class="content">

    <input id="name" placeholder="الاسم" style="width:100%;padding:10px;margin-bottom:10px;">
    <input id="reason" placeholder="سبب الزيارة" style="width:100%;padding:10px;margin-bottom:10px;">

    <button class="btn-book" onclick="goBooking()">إرسال</button>

  </div>
</div>


<div id="bookingPage" class="page">

  <div class="title-box">تم الحجز</div>

  <div class="content">

    <div class="info-card" id="result"></div>

    <button class="btn-book" onclick="location.href='1.html'">
      رجوع للرئيسية
    </button>

  </div>
</div>

<script>

function showClinic(){
  document.getElementById('adminPage').classList.remove('active');
  document.getElementById('clinicPage').classList.add('active');
}

function showAdmin(){
  document.getElementById('clinicPage').classList.remove('active');
  document.getElementById('adminPage').classList.add('active');
}

function goSurvey(){
  document.getElementById('clinicPage').classList.remove('active');
  document.getElementById('surveyPage').classList.add('active');
}

function goBooking(){

  const name = document.getElementById('name').value;
  const reason = document.getElementById('reason').value;

  document.getElementById('surveyPage').classList.remove('active');
  document.getElementById('bookingPage').classList.add('active');

  document.getElementById('result').innerHTML = `
    الاسم: ${name || "غير محدد"} <br>
    السبب: ${reason || "غير محدد"} <br>
    الحالة: تم الحجز ✅
  `;
}

</script>

</body>
</html>
